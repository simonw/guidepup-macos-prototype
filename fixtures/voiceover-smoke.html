<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Guidepup media smoke</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: Canvas;
        color: CanvasText;
      }

      main {
        width: min(720px, calc(100vw - 48px));
      }

      h1 {
        font-size: 36px;
        margin: 0 0 16px;
      }

      p,
      li {
        font-size: 18px;
        line-height: 1.55;
      }

      button,
      a {
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main aria-labelledby="page-title">
      <h1 id="page-title">Guidepup media smoke</h1>
      <p>
        This page gives VoiceOver a tiny, stable surface to read during the
        GitHub Actions media capture experiment.
      </p>
      <button type="button" aria-label="Start audio probe">
        Start audio probe
      </button>
      <nav aria-label="Smoke links">
        <ul>
          <li><a href="#result">Review captured transcript</a></li>
        </ul>
      </nav>
      <p id="result" tabindex="-1">Recording artifacts should include transcript, subtitles, audio, and video.</p>
    </main>
  </body>
</html>
